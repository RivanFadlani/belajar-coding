    <title>Error</title>
  </head>
  <body>
    <script>
      class MathUtil {
        static sum(...numbers) {
          if (numbers.length === 0) {
            throw new Error(`Numbers harus lebih dari sama dengan 0`);
          }

          let total = 0;
          for (const number of numbers) {
            total += number;
          }
          return total;
        }
      }

      const sum = MathUtil.sum(); // error
      console.info(sum);
      console.info("ripunn");

      const hitung = MathUtil.sum(1, 1, 1, 1, 1);
      console.info(hitung);
    </script>
  </body>
