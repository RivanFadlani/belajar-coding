<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constructor di Class</title>
  </head>
  <body>
    <script>
      class Person {
        constructor(name) {
          // seperti parameternya function
          console.info(`Hi, my name is ${name}`);
        }
      }

      const ripunn = new Person("rivan");
    </script>
  </body>
</html>
