<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Await</title>
  </head>
  <body>
    <script>
      // Await:
      // Await digunakan untuk mendapatkan value hasil dari Promise
      // Await hanya bisa digunakan di Async Function

      // Promise<JSON Product>
      function getProduct() {
        const request = new Request("api/product.json", {
          method: "GET",
        });

        const response = fetch(request); // fetch() mengembalikan promise

        return response.then((response) => response.json());
      }

      // test output
      getProduct().then((product) => console.info(`test aja: ${product}`)); // object product
      getProduct().then((product) => console.info(product.name)); // product {name}

      // Promise<String ProductName>

      // ini versi ribet
      function getProductNamePromise() {
        return new Promise(function (resolve, reject) {
          getProduct()
            .then((product) => resolve(product.name))
            .catch((error) => reject(error))
            .finally(() => console.info("Finally Promise"));
        });
      }

      // === ini versi gampang: menggunakan Await ===
      // tanpa chaining method Promise
      async function getProductNameAsync(params) {
        // menggunakan error handler try-catch
        try {
          const product = await getProduct();
          return product.name;
        } catch (e) {
          return `Product Not Found: ${e}`;
        } finally {
          console.info("Finally Async");
        }
      }

      getProductNamePromise().then((productName) =>
        console.info(`Promise: ${productName}`),
      );

      getProductNameAsync().then((productName) =>
        console.info(`Async: ${productName}`),
      );
    </script>
  </body>
</html>
