<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Status</title>
  </head>
  <body>
    <h1 id="header"></h1>
    <script>
      function displayResponse(json) {
        const header = document.getElementById("header");
        header.textContent = json.ripunn;
      }

      const ajax = new XMLHttpRequest();
      ajax.open("GET", "api/hello.json"); // kalau endpoint (.json) tidak terbaca di 'api/' maka akan error 404
      ajax.addEventListener("load", function () {
        if (ajax.status === 200) {
          const json = JSON.parse(ajax.responseText);
          displayResponse(json);
        } else {
          displayResponse({
            ripunn: `Terjadi kesalahan dengan status ${ajax.status}`,
          });
        }
      });
      ajax.send();
    </script>
  </body>
</html>
