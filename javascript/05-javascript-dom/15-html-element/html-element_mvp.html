<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Element</title>
  </head>
  <body>
    <a id="link"></a>

    <script>
      const link = document.getElementById("link");
      link.href =
        "https://developer.mozilla.org/en-US/docs/Web/API/HTMLElement"; // sama saja seperti 'setAttribute(attrName, value)'
      link.target = "_blank";
      link.textContent = "Link Dokumentsi";
    </script>
  </body>
</html>
