<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Method</title>
  </head>
  <body>
    <a href="https://developer.mozilla.org/en-US/docs/Web/API/Document#methods"
      >Link Dokumentasi</a
    >
    <div>
      <p id="tulisan">Ini adalah tulisan</p>
    </div>
    <script>
      // contoh document method
      const tulisan = document.getElementById("tulisan");
      console.info(tulisan);
    </script>
  </body>
</html>
