<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Target</title>
  </head>
  <body>
    <input id="clickMe" type="button" value="Click Me!" />
    <script>
      const btn = document.getElementById("clickMe");
      btn.addEventListener("click", function () {
        btn.setAttribute("value", "ThankU4Clicking!");
      });
      btn.addEventListener("click", function () {
        console.info("whadefugg");
      }); // kalau addEventListener bisa menambahkan beberapa event handler atau callback
    </script>
  </body>
</html>
