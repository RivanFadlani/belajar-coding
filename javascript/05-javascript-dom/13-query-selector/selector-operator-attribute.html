<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector Class</title>
  </head>
  <body>
    <ul>
      <li class="eko">Eko</li>
      <li class="ekokurniawan">Kurniawan</li>
      <li class="ekoKhannedy">Khannedy</li>
    </ul>
    <script>
      const operatorAttrSelector =
        document.querySelectorAll("li[class^='eko']");
      console.info(operatorAttrSelector);
    </script>
  </body>
</html>
