<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector Element</title>

  <body>
    <ul>
      <li>Eko</li>
      <li>Kurniawan</li>

    </script>
