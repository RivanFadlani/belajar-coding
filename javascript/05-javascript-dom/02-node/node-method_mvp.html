<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Method</title>
  </head>
  <body>
    <a href="https://developer.mozilla.org/en-US/docs/Web/API/Node#methods"
      >Link Dokumentasi</a
    >
    <ul id="menu">
      <li id="first">first</li>
      <li id="second">second</li>
      <li id="third">third</li>
    </ul>
    <script>
      const menu = document.getElementById("menu");
      menu.removeChild(document.getElementById("second")); // menghapus element dengan id second
    </script>
  </body>
</html>
