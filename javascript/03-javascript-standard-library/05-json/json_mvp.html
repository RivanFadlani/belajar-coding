<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON</title>
  </head>
  <body>
    <script>
      const person = {
        firstName: "Rivan",
        lastName: "Fadlani",
        address: {
          country: "Indonesia",
          city: "Bogor",
        },
        hobbies: ["Gaming", "Movies", "Coding"],
      };

      // convert object js ke JSON
      const json = JSON.stringify(person);
      console.info(json);

      // conver JSON ke object js
      const jsonObject = JSON.parse(json);
      console.info(jsonObject);
    </script>
  </body>
</html>
