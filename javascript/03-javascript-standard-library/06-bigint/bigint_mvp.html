<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BigInt</title>
  </head>
  <body>
    <script>
      // kalau mau membuat angka yang lebih dari MAX_SAFE_INTEGER, kita harus menggunakan BigInt

      const a = BigInt(Number.MAX_SAFE_INTEGER); // bisa dicek pelajaran number lagi
      const b = BigInt(Number.MAX_SAFE_INTEGER);

      const c = a + b;
      console.info(c);
      console.info(typeof c); // BigInt, angka ditandai dengan huruf n di akhir
    </script>
  </body>
</html>
