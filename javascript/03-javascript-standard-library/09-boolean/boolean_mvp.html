<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boolean</title>
  </head>
  <body>
    <a
      href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Boolean"
      >Link Dokumentasi</a
    >
    <script>
      const boolean = Boolean(true);

      console.info(boolean);
      console.info(boolean.toString()); // convert ke string
      console.info(boolean.valueOf()); // untuk mendapatkan primitif boolean
    </script>
  </body>
</html>
