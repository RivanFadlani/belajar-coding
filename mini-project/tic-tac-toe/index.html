<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tic Tac Toe</title>
  </head>
  <body>
    <div class="wrapper">
      <header id="header">
        <!-- X Player Start -->
        <div class="player player-active" id="x-player-display">X</div>
        <!-- X Player End -->
        <h3 id="title-header">Choose</h3>
        <!-- O Player Start -->
        <div class="player" id="o-player-display">O</div>
        <!-- O Player End -->
      </header>

      <main>
        <div id="board">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>

          <button id="restart-btn">Restart</button>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
