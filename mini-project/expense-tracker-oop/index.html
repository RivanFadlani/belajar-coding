<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!-- Font Start -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <!-- Font End -->
    <title>Expense Tracker OOP</title>
  </head>
  <body>
    <div class="container">
      <h1>Expense Tracker</h1>
      <div class="form">
        <form name="expense-form">
          <div class="input-group">
            <label for="expense-title">Title: </label>
            <input type="text" id="expense-title" name="expense-title" />
          </div>
          <div class="input-group">
            <label for="expense-amount">Amount: </label>
            <input type="number" id="expense-amount" name="expense-amount" />
          </div>
          <div class="input-group">
            <label for="expense-date">Date: </label>
            <input type="date" id="expense-date" name="expense-date" />
          </div>

          <button type="submit">Submit</button>
        </form>
      </div>

      <div class="expense-list-container">
        <h2>Expense List</h2>
        <ul id="expense-list">
          <!-- Input by Javascript -->
        </ul>
        <h3 id="total-amount">0</h3>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
