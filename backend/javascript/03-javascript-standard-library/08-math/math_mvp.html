<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math</title>
  </head>
  <body>
    <a
      href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Math"
      >Link Dokumentasi</a
    >
    <script>
      // cari angka terbesar
      console.info(Math.max(10, 11, 12, 13, 8)); // 13

      // cari angka terkecil
      console.info(Math.min(10, 11, 12, 13, 8)); // 8

      // pembulatan, mana yang paling dekat
      console.info(Math.round(10.5)); // 11
      console.info(Math.round(10.3)); // 10

      // pembulatan yang selalu ke bawah
      console.info(Math.floor(10.8)); // 10

      // pembulatan yang selalu ke atas
      console.info(Math.ceil(10.8)); // 10
    </script>
  </body>
</html>
