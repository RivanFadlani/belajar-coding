<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>String</title>
  </head>
  <body>
    <a
      href="https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/String"
      >Link Dokumentasi</a
    >
    <script>
      const name = "Rivan Fadlani Ripunn";

      console.info(name.length); // hitung character, 20
      console.info(name.toLowerCase()); // rivan fadlani ripunn
      console.info(name.toUpperCase()); // RIVAN FADLANI RIPUNN
      console.info(name.split(" ")); // ["Rivan", "Fadlani", "Ripunn"]

      const input = "     input data     ";
      console.info(input); // sebelum di trim
      console.info(input.trim());
    </script>
  </body>
</html>
