<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable di Module</title>
  </head>
  <body>
    <script type="module">
      import { name } from "./script/variable.js";
      import { name } from "./script/variable2.js"; // kalau di dalam 2 module yang berbeda ada variable name yang sama, bisa gunakan alias

      console.info(name); // error, jika belum menggunakan alias, karena variable bersifat constant. dan jika di declare 2 kali maka variable constant tidak bisa menerima value baru tersebut
    </script>
  </body>
</html>
