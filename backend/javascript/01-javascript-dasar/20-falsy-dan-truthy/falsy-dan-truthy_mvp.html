<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truthy dan Falsy</title>
</head>

<body>

  <script>

    // Falsy
    // 1. Boolean False
    // 2. Number 0 dan -0 dianggap false
    // 3. Semua string kosong dianggap false. kecuali object dan array kosong
    // 4. Null dianggap false
    // 5. Undefined dianggap false
    // 6. NaN dianggap false

    let nama = ""; // false

    if (nama) {
      alert("TRUE"); // true
    } else {
      alert("FALSE"); // false
    }

  </script>

</body>

</html>
