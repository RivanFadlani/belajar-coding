<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nullish Coalescing</title>
</head>

<body>
  <script>

    // ditandai dengan '??'. ini berfungsi untuk ketika suatu variable/parameter tidak memiliki nilai (undefined/null). maka akan diganti dengan nilai default

    let parameter;

    // kalau menggunakan if-expression
    let data = parameter;
    if (data === undefined || data === null) {
      data = "nilai default";
    } // sedangkan kalau parameter memiliki nilai, maka outputnya sesuai dengan nilai yang diisi di parameter

    document.writeln(`<p>${data}</p>`); // nilai default

    // kalau menggunakan nullish coalescing
    data = parameter ?? "nilai default"; // lebih simple daripada menggunakan if-expression

    document.writeln(`<p>${data}</p>`);

  </script>
</body>

</html>
