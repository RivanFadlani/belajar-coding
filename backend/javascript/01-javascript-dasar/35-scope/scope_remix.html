<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scope</title>
</head>

<body>
  <script>

    if (true) {
      // LEVEL BAWAH (Blok If)
      let aksesIzin = "Boleh Masuk";
      console.info(aksesIzin); // BISA: Diakses di level yang sama
    }

    // LEVEL ATAS (General Scope)
    console.info(aksesIzin); // ERROR: Tidak bisa melihat ke dalam blok 'if'

  </script>
</body>

</html>
