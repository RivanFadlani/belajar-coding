<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Closure</title>
  </head>
  <body>
    <script>
      function createAdder(value) {
        const owner = "ripunn";
        function add(param) {
          console.info(owner); // jadi seperti membundle 1 block code funtion createAdder
          return value + param;
        }
        return add; // dikembalikan ke global scope
      }

      const addTwo = createAdder(2);
      // "Oke, apa pun yang dihasilkan oleh createAdder, akan aku simpan."
      // Karena yang dihasilkan adalah fungsi, maka addTwo sekarang berisi fungsi tersebut.
      // jadi seperti ini:
      // function addTwo(param) {
      //   console.info("ripunn");
      //   return 2 + param;
      // }
      console.info(addTwo(10));
    </script>
  </body>
</html>
