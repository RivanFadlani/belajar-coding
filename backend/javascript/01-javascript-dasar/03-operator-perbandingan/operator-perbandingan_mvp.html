<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Perbandingan</title>
</head>

<body>
  <script>

    // operator perbandingan
    result = 5 > 5; // false
    document.writeln("<p>" + result + "</p>");

    result = 5 > 4; // true
    document.writeln("<p>" + result + "</p>");

    result = 5 < 5; // false
    document.writeln("<p>" + result + "</p>");

    result = 5 >= 5; // true
    document.writeln("<p>" + result + "</p>");

    result = 5 == "5"; // true, karena operator perbandingan ini hanya membandingkan angka yang sama tanpa membandingkan tipe datanya sama atau tidak
    document.writeln("<p>" + result + "</p>");

    result = 5 === "5"; // false, operator perbandingan ini membandingkan tipe datanya juga
    document.writeln("<p>" + result + "</p>");

  </script>
</body>

</html>
