<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variable</title>
</head>

<body>
  <script>

    // let
    let fullName = "Rivan Fadlani";
    // const
    const nickname = "ripunn";

    fullName = "Indonesiaku"; // timpa variable let
    // nickname = "tai"; | variable const tidak bisa diubah lagi valuenya

    document.writeln("\"" + fullName + "\""); // output = "indonesiaku"
    document.writeln("</br>")
    document.writeln(nickname);

  </script>
</body>

</html>
