<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element</title>
  </head>
  <body>
    <a href="https://developer.mozilla.org/en-US/docs/Web/API/Element"
      >Link Dokumentasi</a
    >

    <h1 id="title"></h1>
    <p id="description"></p>

    <script>
      const title = document.getElementById("title");
      title.textContent = "Belajar Javascript DOM"; // manipulasi textContent 'h1 id="title"' yang tadinya kosong menjadi ada textContentnya

      const description = document.getElementById("description");
      description.textContent = "Selamat Belajar Javascript DOM";
    </script>
  </body>
</html>
