<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element Property</title>
  </head>
  <body>
    <!-- karena Element adalah turunan dari Node, semua method Node pun bisa digunakan di Element -->
    <a
      href="https://developer.mozilla.org/en-US/docs/Web/API/Element#properties"
      >Link Dokumentasi</a
    >
    <div id="aidi" class="kelas">
      <h1 id="title" class="title">Ini adalah judul</h1>
      <p id="description" class="description">Ini adalah deskripsi</p>
    </div>
    <script>
      const content = document.getElementById("title");
      content.remove(); // menghapus element (diri sendirim, bukan childnya)
    </script>
  </body>
</html>
