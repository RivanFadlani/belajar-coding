<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selector Class</title>
  </head>
  <body>
    <ul>
      <li class="eko">Eko</li>
      <li class="kurniawan">Kurniawan</li>
      <li class="Khannedy">Khannedy</li>
    </ul>
    <script>
      const classSelector = document.querySelector(".eko");
      console.info(classSelector);
    </script>
  </body>
</html>
