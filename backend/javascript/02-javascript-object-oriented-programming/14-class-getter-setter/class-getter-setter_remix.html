<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Getter dan Setter</title>
  </head>
  <body>
    <script>
      class Person {
        // 1. Parameter di constructor diberi nama yang berbeda total
        constructor(namaDepanDariLuar, namaBelakangDariLuar) {
          // 'this' membuat properti di dalam objek dan diisi oleh nilai dari parameter
          this.firstName = namaDepanDariLuar;
          this.lastName = namaBelakangDariLuar;

          // Catatan: Setelah baris di bawah ini selesai,
          // variabel 'namaDepanDariLuar' dan 'namaBelakangDariLuar' akan DIHAPUS dari memori.
        }

        // 2. Getter membaca dari properti objek (this.firstName), bukan dari parameter
        get fullname() {
          return `${this.firstName} ${this.lastName}`;
        }

        // 3. Setter mengubah properti objek (this.firstName)
        set fullname(value) {
          const result = value.split(" ");
          this.firstName = result[0];
          this.lastName = result[1];
        }
      }

      // ==========================================
      // PROSES PEMBUATAN INSTANCE
      // ==========================================

      // Teks "Rivan" masuk ke parameter 'namaDepanDariLuar'
      // Teks "Fadlani" masuk ke parameter 'namaBelakangDariLuar'
      const rivan = new Person("Rivan", "Fadlani");

      // Mari kita cek isi objek instance 'rivan'
      console.info(rivan);
      // Output di console akan menunjukkan properti objeknya, BUKAN nama parameternya:
      // Person { firstName: "Rivan", lastName: "Fadlani" }

      // Memanggil getter (get fullname)
      console.info(rivan.fullname); // Output: "Rivan Fadlani"

      // Memicu setter (set fullname)
      rivan.fullname = "Ripunn Ganteng";

      // Cek lagi objek instance-nya setelah diubah lewat setter
      console.info(rivan);
      // Output: Person { firstName: "Ripunn", lastName: "Ganteng" }
    </script>
  </body>
</html>
