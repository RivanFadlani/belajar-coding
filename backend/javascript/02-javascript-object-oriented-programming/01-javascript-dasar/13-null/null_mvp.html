<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NULL</title>
</head>

<body>
  <script>

    // berbeda dengan UNDIFINED, NULL berfungsi sebagai tipe data yang memberi value kosong/'tidak diisi'

    let nilaiA = null;

    if (nilaiA === null) {
      alert('NULL');
    } else if (nilaiA === undefined) {
      alert('UNDIFINED');
    } else {
      alert(`NOT NULL / DEFINED: ${nilaiA}`);
    }

  </script>
</body>

</html>
