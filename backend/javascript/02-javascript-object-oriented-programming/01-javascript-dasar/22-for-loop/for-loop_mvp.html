<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Loop</title>
</head>

<body>
  <script>

    // for (init statement; condition; post statement) {
    //   output;
    // }

    // for loop
    for (let nilai = 70; nilai <= 80; nilai++) {
      document.writeln(`<p>Yahh.. Nilaimu ${nilai}, coba lagi ya!</p>`);
    }

  </script>
</body>

</html>
