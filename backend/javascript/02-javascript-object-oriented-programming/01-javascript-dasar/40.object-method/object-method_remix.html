<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remix - Object Medhod</title>
  </head>
  <body>
    <script>
      // remix
      const orang = {
        nama: "ripunn",
        // kalau function ada nama
        bilangHalo(nama) {
          return `halo, ${nama}`;
        },
      };

      const panggil = orang.bilangHalo("Killua");
      console.info(panggil);

      // bisa juga dimasukan arrow function
    </script>
  </body>
</html>
