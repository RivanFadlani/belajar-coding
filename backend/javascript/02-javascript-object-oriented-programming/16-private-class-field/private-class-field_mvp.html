<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Class Field</title>
  </head>
  <body>
    <script>
      class Counter {
        #counter = 0; // hanya bisa di akses di dalam class

        increment() {
          this.#counter++;
        }

        decrement() {
          this.#counter--;
        }

        get() {
          return this.#counter;
        }
      }

      const counter = new Counter();

      counter.increment();
      counter.increment();
      counter.increment();
      counter.increment();
      counter.increment();

      console.info(counter.get());

      counter.counter = 100; // jika kita coba manipulasi private class counter, maka line ini tidak akan bisa mengakses #counter
      // counter.#counter = 100;

      console.info(counter);
    </script>
  </body>
</html>
